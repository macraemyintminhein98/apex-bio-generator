<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Instagram Bio Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full text-center">
        <h1 class="text-3xl font-bold mb-4 text-gray-800">AI Instagram Bio Generator</h1>
        <p class="text-gray-600 mb-6">Craft your perfect Instagram bio instantly!</p>
        <div class="mb-4">
            <label for="interests" class="block text-gray-700 text-sm font-bold mb-2">Interests:</label>
            <input type="text" id="interests" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="e.g., travel, tech, food">
        </div>
        <div class="mb-6">
            <label for="vibe" class="block text-gray-700 text-sm font-bold mb-2">Desired Vibe:</label>
            <input type="text" id="vibe" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="e.g., quirky, professional, adventurers">
        </div>
        <button id="generateBtn" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">Generate Bio</button>
        <div id="bioOutput" class="mt-6 p-4 bg-gray-50 border border-gray-200 rounded text-left text-gray-800 hidden">
            <h3 class="font-bold mb-2">Your Bio:</h3>
            <p id="outputContent"></p>
        </div>
        <p class="text-sm text-gray-500 mt-8">Secure payment via Stripe. One-time purchase.</p>
    </div>
    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const interests = document.getElementById('interests').value;
            const vibe = document.getElementById('vibe').value;
            const outputContent = document.getElementById('outputContent');
            const bioOutputDiv = document.getElementById('bioOutput');

            outputContent.textContent = 'Generating...';
            bioOutputDiv.classList.remove('hidden');

            // In a real app, this would call an API (e.g., /api/generate-bio)
            // For this static page, we'll simulate a response.
            setTimeout(() => {
                outputContent.textContent = `🚀 Living my best life, ${interests}! Always chasing ${vibe} vibes ✨`;
            }, 1500);

            // Redirect to Stripe for actual payment and full access
            // window.location.href = 'YOUR_STRIPE_PAYMENT_LINK'; // Uncomment in production
        });
    </script>
</body>
</html>
