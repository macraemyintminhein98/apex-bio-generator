<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenius AI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
        .container { max-width: 600px; margin: 4rem auto; padding: 2rem; background-color: white; border-radius: 0.5rem; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        .btn { padding: 0.75rem 1.5rem; border-radius: 0.375rem; font-weight: bold; cursor: pointer; transition: background-color 0.2s; }
        .btn-primary { background-color: #4f46e5; color: white; border: none; }
        .btn-primary:hover { background-color: #4338ca; }
        .input-field { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.375rem; }
        .output-box { min-height: 100px; background-color: #f9fafb; border: 1px solid #e5e7eb; border-radius: 0.375rem; padding: 1rem; margin-top: 1rem; word-wrap: break-word; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-3xl font-extrabold text-center mb-6 text-gray-800">🌟 BioGenius AI 🌟</h1>
        <p class="text-center text-gray-600 mb-8">Generate stunning Instagram bios instantly!</p>
        <div class="mb-4">
            <label for="keywords" class="block text-sm font-medium text-gray-700 mb-2">Enter keywords (e.g., photographer, travel, entrepreneur):</label>
            <input type="text" id="keywords" class="input-field" placeholder="e.g., foodie, adventurer, digital nomad">
        </div>
        <button id="generateBtn" class="btn btn-primary w-full">Generate Bio</button>
        <div id="output" class="output-box text-gray-700">Your generated bio will appear here.</div>
        <button id="copyBtn" class="btn bg-gray-200 text-gray-700 hover:bg-gray-300 w-full mt-4" style="display: none;">Copy to Clipboard</button>
        <p class="text-center text-sm text-gray-500 mt-6">Powered by AI.</p>
    </div>
    <script>
        const generateBtn = document.getElementById('generateBtn');
        const keywordsInput = document.getElementById('keywords');
        const outputDiv = document.getElementById('output');
        const copyBtn = document.getElementById('copyBtn');

        generateBtn.addEventListener('click', async () => {
            const keywords = keywordsInput.value.trim();
            if (!keywords) {
                outputDiv.textContent = 'Please enter some keywords!';
                copyBtn.style.display = 'none';
                return;
            }
            
            outputDiv.textContent = 'Generating...';
            copyBtn.style.display = 'none';

            // In a real app, this would call a backend API.
            // For this minimal example, we'll simulate a response.
            // Replace with actual API call to your AI model.
            const simulatedBios = [
                `Wanderer ✈️ | Lens Lover 📸 | Documenting life's beauty, one frame at a time. Let's connect!`, 
                `Entrepreneur by day 🚀 | Dreamer by night ✨ | Turning ideas into reality. Join my journey!`, 
                `Foodie 🍔🍕 | Traveler 🌍 | Sharing delicious moments and breathtaking views. Follow for inspo!`
            ];
            const randomBio = simulatedBios[Math.floor(Math.random() * simulatedBios.length)];
            
            setTimeout(() => {
                outputDiv.textContent = randomBio; 
                copyBtn.style.display = 'block';
            }, 1500);
        });

        copyBtn.addEventListener('click', () => {
            const textToCopy = outputDiv.textContent;
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert('Bio copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy text:', err);
            });
        });
    </script>
</body>
</html>
