<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Instagram Bio Generator</title>
    <meta name="description" content="Generate creative, personalized Instagram bios instantly with AI.">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .container-box { max-width: 800px; margin: 2rem auto; padding: 2rem; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .bg-gradient-animate { background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab); background-size: 400% 400%; animation: gradientShift 15s ease infinite; height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-gradient-animate">
    <div class="container-box text-center">
        <h1 class="text-4xl font-bold mb-4 text-gray-800">🌟 InstaBio AI</h1>
        <p class="text-xl text-gray-600 mb-6">Craft your perfect Instagram bio with artificial intelligence.</p>
        <form action="/generate-bio" method="POST" class="space-y-4">
            <div>
                <label for="interests" class="block text-left text-gray-700 font-medium mb-1">Interests (e.g., travel, food, tech):</label>
                <input type="text" id="interests" name="interests" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            <div>
                <label for="niche" class="block text-left text-gray-700 font-medium mb-1">Niche (e.g., blogger, entrepreneur, artist):</label>
                <input type="text" id="niche" name="niche" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label for="tone" class="block text-left text-gray-700 font-medium mb-1">Desired Tone (e.g., funny, professional, inspiring):</label>
                <input type="text" id="tone" name="tone" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-3 px-6 rounded-md text-lg font-semibold hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition duration-300 ease-in-out">
                Generate My Bio! (Only $9.99)
            </button>
        </form>
        <div class="mt-8 text-gray-500 text-sm">
            <p>&copy; 2023 InstaBio AI. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
