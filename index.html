<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenius AI</title>
    <meta name="description" content="Generate creative Instagram bios instantly with AI.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; background-color: #f7f7f7; color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { background-color: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 600px; width: 100%; text-align: center; }
        h1 { color: #8a2be2; margin-bottom: 25px; font-size: 2.2em; }
        p { font-size: 1.1em; line-height: 1.6; margin-bottom: 25px; color: #555; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #666; }
        input[type="text"], select, textarea { width: calc(100% - 22px); padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em; margin-top: 5px; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 80px; }
        button { background-color: #8a2be2; color: white; padding: 14px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: 600; transition: background-color 0.3s ease; width: 100%; }
        button:hover { background-color: #6a1ba3; }
        #result { margin-top: 30px; padding: 20px; background-color: #e9f5e1; border: 1px solid #c8e6c9; border-radius: 8px; text-align: left; display: none; word-wrap: break-word; }
        #loading { display: none; margin-top: 20px; color: #8a2be2; }
        footer { margin-top: 40px; font-size: 0.9em; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BioGenius AI</h1>
        <p>Craft the perfect Instagram bio instantly with AI. Boost your presence!</p>
        <form id="bioForm">
            <div class="input-group">
                <label for="keywords">Keywords (e.g., travel, food, entrepreneur):</label>
                <input type="text" id="keywords" placeholder="Separate with commas" required>
            </div>
            <div class="input-group">
                <label for="tone">Preferred Tone:</label>
                <select id="tone">
                    <option value="professional">Professional</option>
                    <option value="funny">Funny</option>
                    <option value="inspirational">Inspirational</option>
                    <option value="creative" selected>Creative</option>
                    <option value="casual">Casual</option>
                </select>
            </div>
            <button type="submit">Generate My Bio ($9.99)</button>
        </form>
        <div id="loading">Generating magic...</div>
        <div id="result"></div>
    </div>
    <footer>&copy; 2024 BioGenius AI. All rights reserved.</footer>
    <script>
      // Placeholder for frontend logic. Actual integration with backend/Stripe would use a full framework.
      document.getElementById('bioForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const keywords = document.getElementById('keywords').value;
        const tone = document.getElementById('tone').value;
        const resultDiv = document.getElementById('result');
        const loadingDiv = document.getElementById('loading');
        
        loadingDiv.style.display = 'block';
        resultDiv.style.display = 'none';
        resultDiv.innerHTML = '';

        // In a real app, this would trigger a backend call to Stripe Checkout
        // and then, upon successful payment, call the AI API.
        // For this static HTML, we simulate a response.
        setTimeout(() => {
          const sampleBios = [
            `Wanderer ✈️ | Foodie 🍔 | Dreamer ✨ | Crafting stories, one adventure at a time. Let's connect!`, 
            `Turning coffee into code & dreams into reality. Building the future, one byte at a time. Creative solutions incoming!`, 
            `Spreading good vibes & creative sparks. Lover of all things whimsical & impactful. You've got this! 💫`
          ];
          const generatedBio = sampleBios[Math.floor(Math.random() * sampleBios.length)];
          resultDiv.innerHTML = `<strong>Your New Bio:</strong><br>${generatedBio}<br><br><em>(Payment processed successfully! This is a demo output. Your actual bio generator would be much more dynamic.)</em>`;
          resultDiv.style.display = 'block';
          loadingDiv.style.display = 'none';
        }, 2000);
      });
    </script>
</body>
</html>
