<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioBoost AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-neutral-900 text-white min-h-screen flex flex-col items-center justify-center p-4">
    <div class="bg-neutral-800 p-8 rounded-lg shadow-xl w-full max-w-md">
        <h1 class="text-3xl font-bold text-center mb-6 text-indigo-400">BioBoost AI</h1>
        <p class="text-center text-neutral-300 mb-8">Craft the perfect Instagram bio with AI assistance!</p>
        <form id="bio-form" class="space-y-4">
            <div>
                <label for="keywords" class="block text-sm font-medium text-neutral-300 mb-1">Keywords / Niche (e.g., 'travel blogger', 'foodie', 'tech enthusiast')</label>
                <input type="text" id="keywords" name="keywords" class="mt-1 block w-full px-3 py-2 bg-neutral-700 border border-neutral-600 rounded-md text-white placeholder-neutral-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500" placeholder="Enter keywords, separated by commas" required>
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-neutral-800 transition-colors">
                Generate Bio <span id="price-display" class="ml-2 text-opacity-80">(Buy for $9.99)</span>
            </button>
        </form>
        <div id="result" class="mt-8 hidden">
            <h2 class="text-xl font-semibold text-center mb-4 text-indigo-400">Your New Bio:</h2>
            <textarea id="generated-bio" class="w-full px-3 py-2 bg-neutral-700 border border-neutral-600 rounded-md text-white overflow-y-auto resize-none" rows="5" readonly></textarea>
            <button id="copy-btn" class="mt-4 w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2 px-4 rounded-md focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 focus:ring-offset-neutral-800 transition-colors">
                Copy to Clipboard
            </button>
            <p id="disclaimer" class="text-xs text-neutral-400 mt-4 text-center">Payment processed via Stripe. Bio generated by AI.</p>
        </div>
        <p class="text-xs text-neutral-500 mt-6 text-center">Powered by AI</p>
    </div>
    <script>
        document.getElementById('bio-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keywords = document.getElementById('keywords').value;
            // In a real app, this would trigger a backend API call that handles Stripe payment and then GPT API call.
            // For this static HTML, we simulate a response.
            document.getElementById('price-display').textContent = '...Processing Payment';
            setTimeout(() => {
                document.getElementById('price-display').textContent = '(Generating Bio...)';
                setTimeout(() => {
                    const bio = `✨ ${keywords.split(',')[0].trim()} | Passionate about ${keywords.split(',')[1]?.trim() || 'life'} \n Exploring the world, one post at a time. \n DM for collabs! 👇`;
                    document.getElementById('generated-bio').value = bio;
                    document.getElementById('result').classList.remove('hidden');
                    document.getElementById('price-display').textContent = '(Buy for $9.99)';
                }, 2000);
            }, 1500);
        });
        document.getElementById('copy-btn').addEventListener('click', () => {
            const bioTextarea = document.getElementById('generated-bio');
            bioTextarea.select();
            document.execCommand('copy');
            alert('Bio copied to clipboard!');
        });
    </script>
</body>
</html>
