<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenius AI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl p-8 max-w-md w-full text-center">
        <h1 class="text-4xl font-bold text-gray-800 mb-4">BioGenius AI</h1>
        <p class="text-gray-600 mb-6">Craft your perfect Instagram bio with AI.</p>
        <form id="bioForm" class="space-y-4">
            <div>
                <input type="text" id="keywords" placeholder="Keywords (e.g., travel, food, tech)" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
            </div>
            <div>
                <input type="text" id="industry" placeholder="Industry/Niche (e.g., fashion, fitness)" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
            </div>
            <div>
                <select id="tone" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                    <option value="">Select Tone</option>
                    <option value="playful">Playful</option>
                    <option value="professional">Professional</option>
                    <option value="inspirational">Inspirational</option>
                </select>
            </div>
            <div>
                <input type="text" id="cta" placeholder="Call to action (e.g., Link in bio!)" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
            </div>
            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded-lg transition duration-300">
                Generate Bio
            </button>
        </form>
        <div id="result" class="mt-6 p-4 bg-gray-100 rounded-lg text-left text-gray-700 hidden">
            <h3 class="font-semibold mb-2">Your AI-Powered Bio:</h3>
            <p id="bioOutput" class="whitespace-pre-wrap"></p>
        </div>
        <p class="mt-8 text-sm text-gray-500"><a href="#" class="underline">Upgrade to Pro</a> for unlimited bios.</p>
    </div>
    <script>
        document.getElementById('bioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keywords = document.getElementById('keywords').value;
            const industry = document.getElementById('industry').value;
            const tone = document.getElementById('tone').value;
            const cta = document.getElementById('cta').value;

            // This is a placeholder for actual AI API call
            // In a real app, this would hit your backend which then calls OpenAI
            const dummyBio = `✨ ${keywords ? keywords.split(',')[0].trim() : 'Creator'} | ${industry || 'Innovator'} | ${tone ? tone.charAt(0).toUpperCase() + tone.slice(1) : 'Inspiring'} Vibes ✨\n${cta || 'Tap the link in bio!'}`;

            document.getElementById('bioOutput').innerText = dummyBio;
            document.getElementById('result').classList.remove('hidden');
        });
    </script>
</body>
</html>
