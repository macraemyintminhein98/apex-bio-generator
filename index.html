<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenius AI - Instagram Bio Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .container { max-width: 768px; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="container bg-white rounded-lg shadow-xl p-8 space-y-6 text-center">
        <h1 class="text-4xl font-bold text-gray-800">BioGenius AI</h1>
        <p class="text-lg text-gray-600">Craft the perfect Instagram bio with AI!</p>
        
        <div class="space-y-4">
            <input type="text" id="keywords" placeholder="Keywords (e.g., travel, food, tech)" class="w-full p-3 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            <select id="style" class="w-full p-3 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                <option value="funny">Funny</option>
                <option value="professional">Professional</option>
                <option value="inspirational">Inspirational</option>
                <option value="quirky">Quirky</option>
            </select>
            <button id="generateBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">
                Generate Bio
            </button>
        </div>
        
        <div id="result" class="mt-6 p-4 bg-gray-100 border border-gray-200 rounded-md text-left text-gray-700 min-h-[80px] flex items-center justify-center break-words">
            <p class="text-gray-500 italic">Your amazing bio will appear here!</p>
        </div>

        <p class="text-sm text-gray-500 mt-6">Powered by AI. Create unlimited bios with BioGenius AI!</p>
    </div>
    <script>
        // Placeholder for future JavaScript logic (API call, payment integration)
        document.getElementById('generateBtn').addEventListener('click', function() {
            const keywords = document.getElementById('keywords').value;
            const style = document.getElementById('style').value;
            const resultDiv = document.getElementById('result');
            
            if (keywords.trim() === '') {
                resultDiv.innerHTML = '<p class="text-red-500">Please enter some keywords!</p>';
                return;
            }

            resultDiv.innerHTML = '<p class="text-gray-500 italic">Generating your bio...</p>';
            // In a real app, this would make an API call to a backend service like:
            // fetch('/api/generate-bio', { method: 'POST', body: JSON.stringify({ keywords, style }) })
            // .then(response => response.json())
            // .then(data => resultDiv.innerHTML = `<p>${data.bio}</p>`)
            // .catch(error => resultDiv.innerHTML = '<p class="text-red-500">Error generating bio.</p>');
            
            // Simulate AI response
            setTimeout(() => {
                resultDiv.innerHTML = `<p>✨ ${keywords.split(',')[0].trim().toUpperCase()} enthusiast | ${style} vibe | Let's connect! 👇</p>`;
            }, 1500);
        });
    </script>
</body>
</html>
