<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioBoost - AI Instagram Bio Generator</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23000' d='M12 2C6.47 2 2 6.47 2 12c0 4.2 2.58 7.85 6.32 9.3l.5-.8c-3.15-1.28-5.32-4.42-5.32-8.5 0-4.96 4.04-9 9-9s9 4.04 9 9c0 4.08-2.17 7.22-5.32 8.5l.5.8c3.74-1.45 6.32-5.1 6.32-9.3 0-5.53-4.47-10-10-10zm0 14c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z'/%3E%3C/svg%3E" type="image/svg+xml">
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background-color: #f4f7f6; color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-y: auto; }
        .container { background-color: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; }
        h1 { color: #5B42F3; margin-bottom: 15px; font-size: 2.2em; }
        p { max-width: 500px; line-height: 1.6; margin-bottom: 25px; font-size: 1.1em; color: #555; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        input[type="text"], select, textarea { width: calc(100% - 20px); padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1em; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 80px; }
        button { background-color: #5B42F3; color: white; padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1em; font-weight: bold; transition: background-color 0.3s ease; }
        button:hover { background-color: #422CAF; }
        #result { margin-top: 30px; padding: 20px; background-color: #e9f7ef; border-radius: 8px; border: 1px solid #d0efda; text-align: left; word-wrap: break-word; color: #28a745; }
        #price-container { margin-top: 25px; font-size: 1.2em; font-weight: bold; color: #5B42F3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BioBoost</h1>
        <p>Unlock your perfect Instagram bio. Tell us about yourself, and our AI will craft engaging, tailored bios for you!</p>
        <form id="bioForm">
            <div class="form-group">
                <label for="keywords">Keywords (e.g., travel, entrepreneur, fitness, cat lover):</label>
                <input type="text" id="keywords" placeholder="Separate with commas" required>
            </div>
            <div class="form-group">
                <label for="tone">Desired Tone:</label>
                <select id="tone" required>
                    <option value="professional">Professional</option>
                    <option value="funny">Funny</option>
                    <option value="aesthetic">Aesthetic</option>
                    <option value="inspirational">Inspirational</option>
                    <option value="sarcastic">Sarcastic</option>
                    <option value="friendly">Friendly</option>
                </select>
            </div>
            <button type="submit">Generate Bio!</button>
        </form>
        <div id="result" style="display:none;">
            <strong>Your new bio:</strong>
            <p id="generatedBio"></p>
        </div>
        <div id="price-container">Price: $9.99</div>
    </div>

    <script>
        document.getElementById('bioForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const keywords = document.getElementById('keywords').value;
            const tone = document.getElementById('tone').value;
            const generatedBioElement = document.getElementById('generatedBio');
            const resultContainer = document.getElementById('result');
            
            generatedBioElement.textContent = 'Generating your bio...';
            resultContainer.style.display = 'block';

            // In a real application, this would call a backend API that then calls OpenAI.
            // For this static example, we'll simulate a response.
            setTimeout(() => {
                const exampleBios = {
                    professional: `Entrepreneur | Innovator | Building the future, one idea at a time. Connect with me.`, 
                    funny: `I'm not lazy, I'm just on energy-saving mode. Scroll for laughs! 😂`, 
                    aesthetic: `Dreamer. Creator. Living life in full bloom. ✨ Storyteller through visuals.`, 
                    inspirational: `Mindset matters. Inspiring positivity & progress daily. Let's grow together.`, 
                    sarcastic: `Here for the memes and the occasional existential crisis. Mostly memes.`, 
                    friendly: `Your friendly neighborhood human. Sharing good vibes & everyday adventures. 👋`
                };
                generatedBioElement.textContent = exampleBios[tone];
                // In a real app, you'd then initiate Stripe checkout here for payment.
            }, 2000);
        });
    </script>
</body>
</html>
