<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI Bio Generator</title><meta name="description" content="Generate creative Instagram bios with AI."><link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNiAxNiI+PHBhdGggZmlsbD0iYmxhY2siIGQ9Ik04IDBDMy41OCAwIDAgMy41OCAwIDhzMy41OC04IDgtOCA4LTMuNTggOC04LTguNDItOC04LTh6bTUuNTkgNC40MWwtMy41IDMuNS0xLjQxLTEuNDEtMS40MSAxLjQxTDEwLjU5IDggOC40MSA1LjgxIDkgNC40MWwyLjgyIDIuODJMMTMuNTkgNC40MXoiLz48L3N2Z34="><style>body{font-family:sans-serif;margin:20px;background-color:#f4f4f4;color:#333}h1{color:#333}#app{max-width:600px;margin:0 auto;background-color:#fff;padding:20px;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,.1)}textarea,button{width:100%;padding:10px;margin-bottom:10px;border-radius:4px;border:1px solid #ddd}button{background-color:#007bff;color:#fff;cursor:pointer;border:none}button:hover{background-color:#0056b3}#bios-container div{background-color:#eee;padding:10px;margin-bottom:8px;border-radius:4px;word-wrap:break-word}.copy-btn{float:right;background-color:#28a745;width:auto;padding:5px 10px;font-size:.8em}footer{text-align:center;margin-top:20px;color:#777}</style></head><body><div id="app"><h1>AI Bio Generator</h1><p>Generate creative Instagram bios based on your keywords.</p><textarea id="keywords" placeholder="Enter keywords (e.g., foodie, traveler, entrepreneur)" rows="3"></textarea><button onclick="generateBios()">Generate Bios</button><div id="bios-container"></div><div id="price-display">Get unlimited bio generations for $4.99!</div><button onclick="initiatePayment()">Purchase Now</button></div><footer><p>&copy; 2023 APEX Products</p></footer><script>async function generateBios(){const keywords=document.getElementById('keywords').value.trim();if(!keywords)return alert('Please enter some keywords.');const biosContainer=document.getElementById('bios-container');biosContainer.innerHTML='<p>Generating...</p>';try{const response=await fetch('/api/generate-bio',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keywords})});if(!response.ok)throw new Error(`HTTP error! status: ${response.status}`);const data=await response.json();biosContainer.innerHTML=data.bios.map(bio=>`<div>${bio}<button class="copy-btn" onclick="copyToClipboard(this)">Copy</button></div>`).join('');}catch(error){console.error('Error generating bios:',error);biosContainer.innerHTML='<p style="color:red;">Error generating bios. Please try again.</p>';}}function copyToClipboard(button){const bioText=button.parentNode.firstChild.textContent;navigator.clipboard.writeText(bioText).then(()=>{button.textContent='Copied!';setTimeout(()=>button.textContent='Copy',2000);}).catch(err=>{console.error('Could not copy text:',err);});}function initiatePayment(){window.location.href='/checkout';}</script></body></html>
