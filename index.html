<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>InstaBio AI</title><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"></head><body class="bg-gray-100 flex items-center justify-center min-h-screen"><div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md"><h1 class="text-3xl font-bold text-center mb-6">InstaBio AI</h1><p class="text-center text-gray-600 mb-6">Craft your perfect Instagram bio instantly!</p><textarea id="input" class="w-full p-3 border border-gray-300 rounded-md mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" rows="4" placeholder="Tell us about yourself: interests, niche, tone..."></textarea><button id="generateBtn" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">Generate Bio</button><div id="output" class="mt-6 p-4 bg-gray-50 border border-gray-200 rounded-md min-h-[80px]"></div><div id="premiumCTA" class="mt-4 text-center text-sm text-gray-500 hidden">Liked it? <a href="#" class="text-blue-600 hover:underline">Unlock unlimited generations!</a></div></div><script>let generationsLeft = 3; document.getElementById('generateBtn').onclick = async () => { if (generationsLeft <= 0) { document.getElementById('premiumCTA').classList.remove('hidden'); alert('Out of free generations! Please unlock premium.'); return; } const input = document.getElementById('input').value; if (!input) { alert('Please enter some details!'); return; } document.getElementById('generateBtn').textContent = 'Generating...'; try { const response = await fetch('/api/generate-bio', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prompt: input }) }); const data = await response.json(); document.getElementById('output').textContent = data.bio || 'Error generating bio.'; generationsLeft--; console.log(`Generations left: ${generationsLeft}`); } catch (error) { document.getElementById('output').textContent = 'Failed to generate bio.'; console.error('Error:', error); } finally { document.getElementById('generateBtn').textContent = 'Generate Bio'; }};</script></body></html>
