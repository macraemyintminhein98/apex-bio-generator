<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioBoost AI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; }
        .container { max-width: 768px; }
         textarea:focus { outline: none; border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.5);}
         button:focus { outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.5);}
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="container mx-auto bg-white rounded-lg shadow-xl p-8">
        <h1 class="text-4xl font-bold text-center text-gray-800 mb-6">BioBoost AI</h1>
        <p class="text-center text-gray-600 mb-8">Craft the perfect Instagram bio with AI. Just tell us what you're about!</p>

        <div class="mb-6">
            <label for="keywords" class="block text-gray-700 text-sm font-bold mb-2">Keywords (e.g., travel, foodie, tech):</label>
            <input type="text" id="keywords" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="photographer, dog lover, optimist">
        </div>

        <div class="mb-8">
            <label for="tone" class="block text-gray-700 text-sm font-bold mb-2">Desired Tone:</label>
            <select id="tone" class="shadow border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                <option value="professional">Professional</option>
                <option value="funny">Funny</option>
                <option value="aesthetic">Aesthetic</option>
                <option value="motivational">Motivational</option>
                <option value="creative">Creative</option>
            </select>
        </div>

        <button id="generateBtn" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg w-full transition duration-300 ease-in-out">
            Generate My Bio
        </button>

        <div id="result" class="mt-8 p-6 bg-gray-50 border border-gray-200 rounded-lg hidden">
            <h2 class="text-xl font-semibold text-gray-800 mb-3">Your AI-Powered Bio:</h2>
            <p id="bioOutput" class="text-gray-700 whitespace-pre-wrap"></p>
        </div>

        <div class="mt-8 text-center text-sm text-gray-500">
            Powered by AI. &copy; 2023 BioBoost AI.
        </div>
    </div>

    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const keywords = document.getElementById('keywords').value;
            const tone = document.getElementById('tone').value;
            const resultDiv = document.getElementById('result');
            const bioOutput = document.getElementById('bioOutput');

            // Simulate API call for demonstration (replace with actual API call)
            bioOutput.textContent = 'Generating a cool bio for you...';
            resultDiv.classList.remove('hidden');

            try {
                // This would be your API endpoint
                const response = await fetch('/api/generate-bio', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ keywords, tone }),
                });
                const data = await response.json();
                if (data.bio) {
                    bioOutput.textContent = data.bio;
                } else {
                    bioOutput.textContent = 'Could not generate a bio. Please try again.';
                }
            } catch (error) {
                console.error('Error:', error);
                bioOutput.textContent = 'An error occurred. Please try again later.';
            }
        });
    </script>
</body>
</html>
