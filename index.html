<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenius AI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; }
        .container { max-width: 768px; margin: 0 auto; padding: 2rem; }
        input, textarea, select { border: 1px solid #ccc; padding: 0.5rem; border-radius: 0.25rem; width: 100%; margin-bottom: 1rem; }
        button { background-color: #4CAF50; color: white; padding: 0.75rem 1rem; border-radius: 0.25rem; cursor: pointer; }
        .bio-output { background-color: #f0f0f0; padding: 1rem; border-radius: 0.25rem; min-height: 80px; word-wrap: break-word; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container bg-white shadow-lg rounded-lg mt-10">
        <h1 class="text-3xl font-bold text-center mb-6">BioGenius AI</h1>
        <p class="text-center text-gray-600 mb-8">Craft the perfect Instagram bio with AI!</p>
        
        <div class="mb-4">
            <label for="keywords" class="block text-gray-700 text-sm font-bold mb-2">Keywords (e.g., photographer, traveler):</label>
            <input type="text" id="keywords" placeholder="Enter keywords separated by commas">
        </div>

        <div class="mb-4">
            <label for="tone" class="block text-gray-700 text-sm font-bold mb-2">Desired Tone:</label>
            <select id="tone">
                <option value="witty">Witty</option>
                <option value="professional">Professional</option>
                <option value="inspiring">Inspiring</option>
                <option value="casual">Casual</option>
            </select>
        </div>

        <button onclick="generateBio()" class="w-full">Generate Bio</button>

        <div class="mt-8">
            <h2 class="text-xl font-bold mb-4">Your AI-Generated Bio:</h2>
            <div id="bioOutput" class="bio-output"></div>
        </div>
         <div class="text-center mt-6">
            <p class="text-gray-600">Ready for more? Get unlimited bios for just $9.99!</p>
            <button onclick="checkout()" class="mt-4 bg-purple-600 hover:bg-purple-700">Buy Now</button>
        </div>
    </div>
    <script>
        async function generateBio() {
            const keywords = document.getElementById('keywords').value;
            const tone = document.getElementById('tone').value;
            document.getElementById('bioOutput').textContent = 'Generating...';

            // In a real app, this would be an API call to your backend/OpenAI
            // For this static page, we'll simulate a response.
            setTimeout(() => {
                const simulatedBios = {
                    witty: "Explorer 🌍 | Coffee Addict ☕ | Probably thinking about pizza 🍕. Let's connect!",
                    professional: "Content Creator | Brand Strategist | Helping businesses shine online. DM for collaborations.",
                    inspiring: "Dreamer, Doer, Believer ✨. Spreading positivity and chasing sunsets. Join my journey!",
                    casual: "Just a person tryna live their best life. Good vibes only. 😄"
                };
                document.getElementById('bioOutput').textContent = simulatedBios[tone] || "Your unique bio goes here!";
            }, 1500);
        }

        function checkout() {
            alert('Redirecting to secure checkout for $9.99. (Stripe integration would go here!)');
            // In a real app, this would initiate a Stripe checkout session.
        }
    </script>
</body>
</html>
