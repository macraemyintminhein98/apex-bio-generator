<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenius AI</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f0f2f5; color: #333; text-align: center; }
        .container { max-width: 600px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #5B21B6; margin-bottom: 20px; }
        p { margin-bottom: 25px; line-height: 1.6; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; text-align: left; }
        .input-group input[type="text"], .input-group select { width: calc(100% - 20px); padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        .input-group textarea { width: calc(100% - 20px); padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; resize: vertical; min-height: 80px; }
        button { background-color: #5B21B6; color: white; padding: 14px 25px; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; transition: background-color 0.3s ease; }
        button:hover { background-color: #6D28D9; }
        .result { margin-top: 30px; padding: 20px; background-color: #e2e8f0; border-radius: 8px; text-align: left; overflow-wrap: break-word; }
        .footer { margin-top: 50px; font-size: 0.85em; color: #666; }
        .price { font-weight: bold; color: #d946ef; font-size: 1.2em; display: block; margin-bottom: 15px; }

        /* Placeholder for JS interactivity, will be added via framework/backend */
    </style>
</head>
<body>
    <div class="container">
        <h1>BioGenius AI</h1>
        <p>Craft the perfect Instagram bio in seconds! Tell us about yourself, choose a style, and let AI do the rest.</p>
        <form id="bioForm">
            <div class="input-group">
                <label for="keywords">Keywords (e.g., photographer, traveler, foodie, dog lover):</label>
                <input type="text" id="keywords" placeholder="Enter keywords, comma-separated" required>
            </div>
            <div class="input-group">
                <label for="style">Bio Style:</label>
                <select id="style">
                    <option value="professional">Professional</option>
                    <option value="quirky">Quirky</option>
                    <option value="inspirational">Inspirational</option>
                    <option value="minimalist">Minimalist</option>
                </select>
            </div>
            <span class="price">Only $2.50 for instant bio generation!</span>
            <button type="submit">Generate My Bio</button>
        </form>
        <div class="result" id="bioResult" style="display:none;">
            <h2>Your AI-Generated Bio:</h2>
            <p id="generatedBio"></p>
        </div>
        <p class="footer">Powered by APEX AI</p>
    </div>
    <script>
        // Placeholder for client-side JS logic, will interact with backend/Stripe
        document.getElementById('bioForm').addEventListener('submit', function(event) {
            event.preventDefault();
            // In a real app, this would trigger payment flow and then API call
            document.getElementById('generatedBio').innerText = "Generating your bio... (Integration with Stripe/AI API will happen here). Example: 📸 Capturing moments & making memories.  wanderlust-fueled adventurer & always seeking the next delicious bite. 🐶 Dog mom. ";
            document.getElementById('bioResult').style.display = 'block';
        });
    </script>
</body>
</html>
