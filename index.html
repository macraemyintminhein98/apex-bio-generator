<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenius AI</title>
    <meta name="description" content="Generate stunning Instagram bios instantly with AI.">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 text-gray-800 bg-gradient-to-br from-indigo-50 to-purple-50">
    <header class="mb-8 text-center">
        <h1 class="text-5xl font-extrabold text-indigo-700">BioGenius AI</h1>
        <p class="mt-3 text-xl text-gray-600">Craft your perfect Instagram bio in seconds.</p>
    </header>
    <main class="w-full max-w-lg p-8 bg-white rounded-xl shadow-2xl fade-in">
        <form id="bio-form" class="space-y-6">
            <div>
                <label for="keywords" class="block text-sm font-semibold text-gray-700 mb-2">Keywords (e.g., tech, travel, foodie)</label>
                <input type="text" id="keywords" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition duration-200" placeholder="Enter comma-separated keywords" required>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 transition duration-200 shadow-md font-bold text-lg">
                Generate Bios
            </button>
        </form>
        <div id="results" class="mt-8 space-y-4">
            <!-- Generated bios will appear here -->
        </div>
        <div id="loading" class="hidden mt-4 text-center text-indigo-500">
            <p>Generating amazing bios...</p>
        </div>
        <div id="error" class="hidden mt-4 text-center text-red-500">
            <p>Oops! Something went wrong. Please try again.</p>
        </div>
    </main>

    <script>
        document.getElementById('bio-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keywords = document.getElementById('keywords').value;
            const resultsDiv = document.getElementById('results');
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error');

            resultsDiv.innerHTML = '';
            loadingDiv.classList.remove('hidden');
            errorDiv.classList.add('hidden');

            try {
                // In a real app, this would be an API call to a backend service that calls OpenAI
                const mockBios = [
                    `Wanderlust-fueled adventurer 🌍 | Code wizard 💻 | Coffee aficionado ☕ | Living life one byte at a time.`, 
                    `Passionate storyteller ✨ | Embracing the chaos & beauty of life | Connect with me for daily inspiration.`, 
                    `Future is bright, coffee is strong. Building dreams & breaking barriers. Let's create something amazing.`, 
                    `Foodie, fitness enthusiast, and proud plant parent. Spreading positivity & good vibes.`
                ];
                
                await new Promise(resolve => setTimeout(resolve, 2000)); // Simulate API call

                mockBios.forEach(bio => {
                    const bioCard = document.createElement('div');
                    bioCard.className = 'p-4 bg-gray-50 rounded-lg border border-gray-200 text-gray-700 text-sm fade-in';
                    bioCard.textContent = bio;
                    resultsDiv.appendChild(bioCard);
                });

            } catch (error) {
                console.error("Error generating bio:", error);
                errorDiv.classList.remove('hidden');
            } finally {
                loadingDiv.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
